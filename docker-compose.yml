version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: emotion-analysis-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emotion_analysis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: emotion-analysis-server
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/emotion_analysis?schema=public"
      JWT_SECRET: "change-this-to-a-secure-random-string"
      JWT_EXPIRES_IN: "7d"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      PORT: 5000
      CLIENT_URL: "http://localhost:5173"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma generate && npx prisma db push && node dist/app.js"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: emotion-analysis-client
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres_data:
